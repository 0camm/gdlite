<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Geometry Dash" />
  <title>Geometry Dash</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    #loader_game_iframe {
      display: inline-block;
      width: 15px;
      aspect-ratio: 1;
      border-radius: 50%;
      animation: 1s linear infinite alternate l5;
    }

    @keyframes l5 {
      0%   { box-shadow: 20px 0 #818181, -20px 0 #0002; background: #818181; }
      33%  { box-shadow: 20px 0 #818181, -20px 0 #0002; background: #0002; }
      66%  { box-shadow: 20px 0 #0002, -20px 0 #818181; background: #0002; }
      100% { box-shadow: 20px 0 #0002, -20px 0 #000; background: #000; }
    }

    .frame-box-game,
    .game_area_frame,
    .game-frame,
    .game-iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .game_area_frame {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      z-index: 1;
      overflow: hidden;
    }

    .game-preview {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: none;
    }

    .game-preview-bgi {
      position: absolute;
      inset: 0;
      z-index: 10;
      background-position: center;
      background-size: cover;
      filter: blur(10px);
    }

    .game-preview__content {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background-color: rgb(0 0 0 / 0.6);
    }

    .game-preview__logo img {
      border-radius: 8px;
      box-shadow: 0 0 1rem 0 #fff;
      max-width: 200px;
    }

    .game-preview__title {
      font-size: 24px;
      color: #fff;
      font-weight: 700;
      margin: 20px auto;
      background: linear-gradient(90deg, #fff0 0, rgb(0 0 0 / 0.3) 50%, #fff0);
      width: 100%;
      text-align: center;
      padding: 14px 0;
      font-family: inherit;
    }

    .play-btn {
      position: relative;
      display: inline-block;
      vertical-align: top;
      height: 50px;
    }

    .play-btn__ctrl {
      position: relative;
      overflow: hidden;
      appearance: none;
      z-index: 10;
      box-shadow: 0 0 1rem 0 #fff;
      background: #ff3814;
      font-weight: 700;
      color: #fff;
      font-size: 22px;
      padding: 0 32px;
      border-radius: 16px;
      border: 0;
      margin: 0;
      cursor: pointer;
      height: 50px;
      transition: box-shadow .15s, background-color .15s, transform .1s, opacity .1s;
    }

    .play-btn__ctrl[disabled="disabled"] {
      opacity: .5;
    }

    .game-iframe {
      bottom: 0;
      left: 0;
      right: 0;
    }

    .frame_fix_mobile {
      position: fixed !important;
      left: 0;
      top: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      background: #fff;
      z-index: 9999;
      box-shadow: unset;
      border-radius: unset;
    }

    .frame_fix_mobile .game-preview {
      height: 100% !important;
      width: 100% !important;
    }
  </style>

  <script>
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
      (navigator.maxTouchPoints > 1 && /Macintosh/i.test(navigator.userAgent));

    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const _isMobile = (isMobile || isTouchDevice) && window.matchMedia('(max-width: 768px)').matches;

    var isNewWindow = false;
    var hasVideoPreview = false;
  </script>
</head>
<body>
  <div class="frame-box-game" id="frame-container">
    <div class="game-preview" style="display: none;">
      <div class="game-preview-bgi" style="background-image: url('https://geometry-games.io/cache/data/image/game/homepage/geometry-game-m320x190.webp')"></div>
      <div class="game-preview__content">
        <div class="game-preview__logo">
          <img src="https://geometry-games.io/cache/data/image/game/homepage/geometry-game-m320x190.webp" alt="Play Geometry Dash now!">
        </div>
        <div class="game-preview__title">Geometry Dash</div>
        <div class="game-preview__run">
          <div class="play-btn">
            <button id="show-embed" style="display: inline-block;" data-width="800" data-height="600" data-iframe="https://geometry-dash-lite.1games.io/" type="button" class="play-btn__ctrl">Play</button>
            <div id="loader_game_iframe" style="display: none;"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="game-code" class="game-frame" data-id="1" style="display: block;">
      <iframe
        class="game-iframe"
        id="game-area"
        src="https://geometry-dash-lite.1games.io/"
        width="800"
        height="600"
        allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
        scrolling="no"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

    <div id="game-code-mobile" class="game-frame" style="display: none;" data-id="1">
      <iframe
        class="game-iframe"
        id="game-area-mobile"
        src="about:blank"
        width="800"
        height="600"
        allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
        scrolling="no"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

    <script>
      if (!isMobile || !isTouchDevice) {
        window.addEventListener("DOMContentLoaded", function () {
          let prerollButton = document.querySelector("#show-embed");
          let loading_iframe = document.querySelector("#loader_game_iframe");

          if (prerollButton) prerollButton.style.display = 'inline-block';
          if (loading_iframe) loading_iframe.style.display = 'none';

          if (!isNewWindow && prerollButton) {
            prerollButton.addEventListener('click', e => {
              loadGameIframe();
            });

            if (!_isMobile && !hasVideoPreview) {
              prerollButton.click();
            }
          }
        });
      } else {
        loadGameIframe();
      }

      function loadGameIframe() {
        const showEmbed = document.getElementById("show-embed");
        const link_iframe = showEmbed ? showEmbed.getAttribute('data-iframe') : "https://geometry-dash-lite.1games.io/";
        const width = showEmbed ? showEmbed.getAttribute('data-width') : "800";
        const height = showEmbed ? showEmbed.getAttribute('data-height') : "600";

        if (_isMobile) {
          const gameCode = document.getElementById("game-code");
          if (gameCode) gameCode.style.display = 'none';

          document.body.classList.add("isFullscreen");

          document.querySelectorAll(".game_area_frame").forEach(function (el) {
            el.classList.add("frame_fix_mobile");
          });

          const gameCodeMobile = document.getElementById("game-code-mobile");
          if (gameCodeMobile) {
            const iframe = gameCodeMobile.querySelector("iframe");
            if (iframe) {
              iframe.src = link_iframe;
              gameCodeMobile.style.display = 'block';
            }
          }

          document.querySelectorAll(".game-preview").forEach(function (el) {
            el.style.display = 'none';
          });
        } else {
          const gameCodeMobile = document.getElementById("game-code-mobile");
          if (gameCodeMobile) gameCodeMobile.style.display = 'none';

          document.body.classList.remove("isFullscreen");

          document.querySelectorAll(".game_area_frame").forEach(function (el) {
            el.classList.remove("frame_fix_mobile");
          });

          const gameCode = document.getElementById("game-code");
          if (gameCode) {
            const iframe = gameCode.querySelector("iframe");
            if (iframe) {
              iframe.src = link_iframe;
              iframe.width = width;
              iframe.height = height;
              gameCode.style.display = 'block';
            }
          }

          document.querySelectorAll(".game-preview").forEach(function (el) {
            el.style.display = 'none';
          });
        }

        const mobileNav = document.getElementById("mobile-nav");
        if (mobileNav) {
          mobileNav.addEventListener('click', function () {
            document.body.classList.remove("isFullscreen");
            document.querySelectorAll(".game_area_frame").forEach(function (el) {
              el.classList.remove("frame_fix_mobile");
            });
            document.querySelectorAll(".game-preview").forEach(function (el) {
              el.style.display = 'block';
            });
            const gameCodeMobile = document.getElementById("game-code-mobile");
            if (gameCodeMobile) gameCodeMobile.style.display = 'none';
          });
        }
      }

      function setupEnhancedIframeMonitoring() {
        setTimeout(() => {
          const gameIframe = document.getElementById("game-area");
          if (gameIframe) {
            window.gameIframeState = {
              loaded: false,
              ready: false,
              src: gameIframe.src
            };

            gameIframe.addEventListener('load', function () {
              window.gameIframeState.loaded = true;

              if (this.src && this.src !== 'about:blank') {
                window.gameIframeState.src = this.src;
              }

              setTimeout(() => {
                window.gameIframeState.ready = true;
                window.dispatchEvent(new CustomEvent('iframeContentReady', {
                  detail: {
                    iframe: this,
                    src: this.src,
                    timestamp: Date.now()
                  }
                }));
              }, 3000);
            });

            gameIframe.addEventListener('error', function () {
              window.gameIframeState.loaded = false;
              window.gameIframeState.ready = false;
            });

            let lastSrc = gameIframe.src;
            const srcMonitor = setInterval(() => {
              if (gameIframe.src !== lastSrc) {
                lastSrc = gameIframe.src;
                window.gameIframeState.src = gameIframe.src;
                window.gameIframeState.ready = false;

                setTimeout(() => {
                  window.gameIframeState.ready = true;
                  window.dispatchEvent(new CustomEvent('iframeContentReady', {
                    detail: {
                      iframe: gameIframe,
                      src: gameIframe.src,
                      timestamp: Date.now()
                    }
                  }));
                }, 3000);
              }
            }, 1000);

            setTimeout(() => clearInterval(srcMonitor), 60000);
          }
        }, 200);
      }
    </script>
  </div>
</body>
</html>
